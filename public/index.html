<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartLink - URL Shortener</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:#fff;
}

.container{
  width:100%;
  max-width:500px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;
  padding:30px 25px;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.logo{
  width:70px;
  height:70px;
  margin:auto;
  margin-bottom:20px;
  border-radius:20px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:700;
}

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#cbd5e1;
  font-size:15px;
  margin-bottom:30px;
  line-height:1.6;
}

.input-box{
  width:100%;
  margin-bottom:20px;
}

.input-box input{
  width:100%;
  padding:18px;
  border:none;
  outline:none;
  border-radius:16px;
  background:#fff;
  font-size:15px;
  color:#111827;
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:#fff;
  font-size:17px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

.result-box{
  margin-top:25px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.07);
  display:none;
}

.result-box p{
  margin-bottom:12px;
  color:#cbd5e1;
  font-size:14px;
}

.result-link{
  display:block;
  width:100%;
  padding:14px;
  border-radius:14px;
  background:#0f172a;
  color:#38bdf8;
  text-decoration:none;
  word-break:break-all;
  margin-bottom:12px;
}

.copy-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#10b981;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.footer{
  margin-top:25px;
  text-align:center;
  color:#94a3b8;
  font-size:13px;
}

.stats{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:25px;
}

.stat-card{
  flex:1;
  background:rgba(255,255,255,0.07);
  border-radius:16px;
  padding:16px;
  text-align:center;
}

.stat-card h3{
  font-size:20px;
  margin-bottom:5px;
}

.stat-card p{
  color:#cbd5e1;
  font-size:13px;
}

@media(max-width:600px){
  h1{
    font-size:26px;
  }

  .container{
    padding:25px 18px;
  }

  .stats{
    flex-direction:column;
  }
}
</style>
</head>
<body>

<div class="container">

<div class="logo">S</div>

<h1>SmartLink</h1>
<p class="subtitle">
Create fast, secure and smart shortened URLs instantly.
Share links anywhere with a beautiful modern experience.
</p>

<div class="input-box">
  <input type="text" id="url" placeholder="Paste your long URL here...">
</div>

<button onclick="shorten()">Shorten URL</button>

<div class="result-box" id="resultBox">
  <p>Your shortened URL:</p>

  <a href="#" target="_blank" id="shortLink" class="result-link"></a>

  <button class="copy-btn" onclick="copyLink()">Copy Link</button>
</div>

<div class="stats">
  <div class="stat-card">
    <h3>Fast</h3>
    <p>Lightning speed redirects</p>
  </div>

  <div class="stat-card">
    <h3>Secure</h3>
    <p>Protected cloud hosting</p>
  </div>

  <div class="stat-card">
    <h3>Free</h3>
    <p>Unlimited short links</p>
  </div>
</div>

<div class="footer">
Powered by Render & MongoDB
</div>

</div>

<script>
async function shorten(){

  const url = document.getElementById('url').value;

  if(!url){
    alert('Please enter a URL');
    return;
  }

  try{

    const response = await fetch('/shorten',{
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify({url})
    });

    const data = await response.json();

    document.getElementById('resultBox').style.display = 'block';

    const shortLink = document.getElementById('shortLink');

    shortLink.href = 'https://' + data.shortUrl;
    shortLink.innerText = 'https://' + data.shortUrl;

  }catch(error){
    alert('Something went wrong');
    console.log(error);
  }
}

function copyLink(){

  const text = document.getElementById('shortLink').innerText;

  navigator.clipboard.writeText(text);

  alert('Short link copied!');
}
</script>

</body>
    </html>
